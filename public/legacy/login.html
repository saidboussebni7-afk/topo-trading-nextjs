<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOPO TRADING VIP — دخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --gold: #c9a84c;
  --gold2: #f0d080;
  --dark: #04080f;
  --panel: #080e1a;
  --border: #1a2540;
  --blue: #0066ff;
  --cyan: #00c8ff;
  --text: #e8edf5;
  --muted: #4a5a7a;
  --red: #ff2244;
  --green: #00e676;
}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Animated background */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.particle {
  position: absolute;
  border-radius: 50%;
  animation: float linear infinite;
  opacity: 0;
}

@keyframes float {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.3; }
  100% { transform: translateY(-20px) scale(1); opacity: 0; }
}

/* Grid lines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,100,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,100,255,0.04) 1px, transparent 1px);
  background-size: 50px 50px;
  z-index: 0;
}

/* Glow orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  z-index: 0;
  pointer-events: none;
}
.orb1 { width: 400px; height: 400px; background: rgba(0,100,255,0.08); top: -100px; right: -100px; }
.orb2 { width: 350px; height: 350px; background: rgba(201,168,76,0.06); bottom: -80px; left: -80px; }
.orb3 { width: 250px; height: 250px; background: rgba(0,200,255,0.05); top: 40%; left: 50%; transform: translate(-50%,-50%); }

/* Main card */
.login-card {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 440px;
  padding: 20px;
  animation: cardIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(40px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.card-inner {
  background: rgba(8,14,26,0.95);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px 36px;
  backdrop-filter: blur(20px);
  box-shadow:
    0 0 0 1px rgba(201,168,76,0.1),
    0 40px 80px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.05);
  position: relative;
  overflow: hidden;
}

/* Gold shimmer top border */
.card-inner::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), var(--gold2), var(--gold), transparent);
  animation: shimmer 3s ease-in-out infinite;
}

@keyframes shimmer {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* Logo section */
.logo-section {
  text-align: center;
  margin-bottom: 36px;
}

.logo-wrapper {
  width: 90px;
  height: 90px;
  margin: 0 auto 16px;
  border-radius: 20px;
  border: 2px solid rgba(201,168,76,0.3);
  overflow: hidden;
  box-shadow: 0 0 30px rgba(201,168,76,0.2);
  animation: logoPulse 3s ease-in-out infinite;
}

@keyframes logoPulse {
  0%, 100% { box-shadow: 0 0 20px rgba(201,168,76,0.2); }
  50% { box-shadow: 0 0 40px rgba(201,168,76,0.4); }
}

.logo-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.logo-placeholder {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #0a1428, #1a2a4a);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
}

.brand-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--gold), var(--gold2), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}

.brand-sub {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* Divider */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}

.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border));
}

.divider-line.right {
  background: linear-gradient(270deg, transparent, var(--border));
}

.divider-text {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  white-space: nowrap;
}

/* Form */
.form-group { margin-bottom: 20px; }

.form-label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.input-wrapper {
  position: relative;
}

.form-input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 50px 14px 18px;
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 3px;
  text-align: center;
  transition: all 0.3s;
  outline: none;
  direction: ltr;
}

.form-input::placeholder {
  color: var(--muted);
  letter-spacing: 1px;
  font-size: 13px;
}

.form-input:focus {
  border-color: var(--gold);
  background: rgba(201,168,76,0.03);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
}

.input-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  pointer-events: none;
}

/* Submit button */
.submit-btn {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, var(--gold), var(--gold2), var(--gold));
  background-size: 200% 100%;
  color: #0a0a0a;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 1px;
  position: relative;
  overflow: hidden;
}

.submit-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: translateX(-100%);
  transition: transform 0.6s;
}

.submit-btn:hover::before { transform: translateX(100%); }
.submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(201,168,76,0.4); }
.submit-btn:active { transform: translateY(0); }

.submit-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* Status messages */
.status-msg {
  text-align: center;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  margin-top: 16px;
  display: none;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-5px); }
  to { opacity: 1; transform: translateY(0); }
}

.status-msg.error {
  background: rgba(255,34,68,0.1);
  border: 1px solid rgba(255,34,68,0.3);
  color: var(--red);
  display: block;
}

.status-msg.success {
  background: rgba(0,230,118,0.1);
  border: 1px solid rgba(0,230,118,0.3);
  color: var(--green);
  display: block;
}

.status-msg.loading {
  background: rgba(0,100,255,0.08);
  border: 1px solid rgba(0,100,255,0.2);
  color: var(--cyan);
  display: block;
}

/* Footer links */
.footer-links {
  margin-top: 28px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.tg-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 10px;
  border: 1px solid rgba(0,136,204,0.3);
  background: rgba(0,136,204,0.06);
  color: #29b6f6;
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.3s;
}

.tg-link:hover {
  background: rgba(0,136,204,0.12);
  border-color: rgba(0,136,204,0.5);
  transform: translateY(-2px);
}

.po-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 10px;
  border: 1px solid rgba(201,168,76,0.2);
  background: rgba(201,168,76,0.04);
  color: var(--gold);
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.3s;
}

.po-link:hover {
  background: rgba(201,168,76,0.08);
  border-color: rgba(201,168,76,0.4);
}

/* Loading spinner */
.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.3);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-left: 8px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Expired/used info */
.info-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 11px;
  color: var(--muted);
  margin-top: 16px;
}

.info-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="bg-canvas" id="bgCanvas"></div>

<div class="login-card">
  <div class="card-inner">

    <!-- Logo -->
    <div class="logo-section">
      <div class="logo-wrapper">
        <div class="logo-placeholder">📊</div>
      </div>
      <div class="brand-name">TOPO TRADING</div>
      <div class="brand-sub">V I P &nbsp; S I G N A L S</div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">أدخل كود الاشتراك</div>
      <div class="divider-line right"></div>
    </div>

    <!-- Form -->
    <div class="form-group">
      <label class="form-label">كود الترخيص الخاص بك</label>
      <div class="input-wrapper">
        <input
          type="text"
          class="form-input"
          id="licenseInput"
          placeholder="XXXX-XXXX-XXXX"
          maxlength="20"
          autocomplete="off"
          spellcheck="false"
        />
        <span class="input-icon">🔑</span>
      </div>
    </div>

    <button class="submit-btn" id="loginBtn" onclick="checkLicense()">
      دخول المنصة
    </button>

    <div class="status-msg" id="statusMsg"></div>

    <div class="info-row">
      <div class="info-dot"></div>
      <span>للحصول على كود الاشتراك تواصل معنا على تيليجرام</span>
      <div class="info-dot"></div>
    </div>

    <!-- Footer links -->
    <div class="footer-links">
      <a href="https://t.me/TopotradingVIP" target="_blank" class="tg-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#29b6f6"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-2.018 9.504c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.881.717z"/></svg>
        قناة TOPO TRADING VIP
      </a>
      <a href="https://po-ru1.click/register?utm_campaign=801367&utm_source=affiliate&utm_medium=sr&a=cdMx4feSVrHSxW&ac=topovip&code=50START" target="_blank" class="po-link">
        🎯 سجّل في Pocket Option واحصل على 50% بونص
      </a>
    </div>

  </div>
</div>

<script>
// ============================================================
// JSONBIN DATABASE
// ============================================================
const JSONBIN_ID  = '69ee2e48856a68218974dc74';
const JSONBIN_KEY = '$2a$10$x69VKI08PZXdy.vGGdiENuJpjwleAtpKh6XuiC2k1q5F1YPCSuW6m';
const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;

async function getLicenses() {
  const res = await fetch(JSONBIN_URL + '/latest', {
    headers: { 'X-Master-Key': JSONBIN_KEY }
  });
  if (!res.ok) throw new Error('فشل الاتصال بقاعدة البيانات');
  const data = await res.json();
  return data.record.licenses || [];
}

// ============================================================
// PARTICLES
// ============================================================
function createParticles() {
  const canvas = document.getElementById('bgCanvas');
  const colors = ['rgba(201,168,76,0.3)', 'rgba(0,100,255,0.2)', 'rgba(0,200,255,0.2)'];
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 1;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      left:${Math.random() * 100}%;
      animation-duration:${Math.random() * 15 + 8}s;
      animation-delay:${Math.random() * 8}s;
    `;
    canvas.appendChild(p);
  }
}
createParticles();

// ============================================================
// FORMAT INPUT
// ============================================================
document.getElementById('licenseInput').addEventListener('input', function() {
  let val = this.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
  if (val.length > 4) val = val.slice(0,4) + '-' + val.slice(4);
  if (val.length > 9) val = val.slice(0,9) + '-' + val.slice(9);
  if (val.length > 14) val = val.slice(0,14) + '-' + val.slice(14);
  this.value = val.slice(0, 19);
});

document.getElementById('licenseInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') checkLicense();
});

// ============================================================
// DEVICE ID
// ============================================================
function getDeviceId() {
  let id = localStorage.getItem('topo_device_id');
  if (!id) {
    id = 'dev_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('topo_device_id', id);
  }
  return id;
}

async function saveLicenses(licenses) {
  const res = await fetch(JSONBIN_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
    body: JSON.stringify({ licenses })
  });
  if (!res.ok) throw new Error('فشل حفظ البيانات');
}

// ============================================================
// LICENSE CHECK
// ============================================================
async function checkLicense() {
  const raw = document.getElementById('licenseInput').value.trim();
  const code = raw.replace(/-/g, '').toUpperCase();
  const btn = document.getElementById('loginBtn');

  if (code.length < 8) {
    showMsg('error', '❌ يرجى إدخال كود صحيح');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = 'جاري التحقق... <span class="spinner"></span>';
  showMsg('loading', '🔄 جاري التحقق من الكود...');

  try {
    const licenses = await getLicenses();
    const idx = licenses.findIndex(l => l.code.replace(/-/g,'').toUpperCase() === code);

    if (idx === -1) {
      showMsg('error', '❌ الكود غير موجود — تواصل معنا على تيليجرام');
      btn.disabled = false; btn.innerHTML = 'دخول المنصة'; return;
    }

    const found = licenses[idx];

    if (!found.active) {
      showMsg('error', '🚫 هذا الكود تم إيقافه — تواصل مع الأدمن');
      btn.disabled = false; btn.innerHTML = 'دخول المنصة'; return;
    }

    const now = new Date();
    const expires = new Date(found.expiresAt);
    if (now > expires) {
      showMsg('error', '⏰ انتهت صلاحية الكود — جدد اشتراكك');
      btn.disabled = false; btn.innerHTML = 'دخول المنصة'; return;
    }

    // ── Device enforcement ──
    const deviceId = getDeviceId();
    const devices = Array.isArray(found.devices) ? found.devices : [];
    const maxUsers = found.maxUsers || 1;

    const alreadyRegistered = devices.includes(deviceId);

    if (!alreadyRegistered) {
      if (devices.length >= maxUsers) {
        showMsg('error', `🚫 تم الوصول للحد الأقصى من الأجهزة (${maxUsers}) — تواصل مع الأدمن`);
        btn.disabled = false; btn.innerHTML = 'دخول المنصة'; return;
      }
      // Register this device
      devices.push(deviceId);
      licenses[idx] = {
        ...found,
        devices,
        currentUsers: devices.length,
        lastLogin: new Date().toISOString()
      };
      await saveLicenses(licenses);
    } else {
      // Already registered — just update lastLogin
      licenses[idx] = { ...found, lastLogin: new Date().toISOString() };
      await saveLicenses(licenses);
    }

    handleSuccess(code, expires);

  } catch(err) {
    showMsg('error', '⚠️ خطأ في الاتصال — تحقق من الإنترنت');
    btn.disabled = false; btn.innerHTML = 'دخول المنصة';
    console.error(err);
  }
}

function handleSuccess(code, expires) {
  showMsg('success', '✅ تم التحقق! جاري التحويل...');
  sessionStorage.setItem('topo_license', code);
  sessionStorage.setItem('topo_auth', 'true');
  sessionStorage.setItem('topo_expires', expires instanceof Date ? expires.toISOString() : new Date(expires).toISOString());
  setTimeout(() => { window.location.href = '/signals'; }, 1200);
}

function showMsg(type, text) {
  const msg = document.getElementById('statusMsg');
  msg.className = `status-msg ${type}`;
  msg.textContent = text;
}
</script>
</body>
</html>
